services:
  msvc-eureka:
    build: ./msvc-eureka
    container_name: msvc-eureka
    ports:
      - "8761:8761"
    networks:
      - esport-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  msvc-gateway:
    build: ./msvc-gateway
    container_name: msvc-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://msvc-eureka:8761/eureka/
    depends_on:
      msvc-eureka:
        condition: service_healthy
    networks:
      - esport-network

  auth-service:
